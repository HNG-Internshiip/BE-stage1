[build]
  command   = "npm install"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["routes/**", "services/**", "db/**"]
  external_node_modules = ["pg", "pg-native", "express", "serverless-http", "node-fetch"]

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200